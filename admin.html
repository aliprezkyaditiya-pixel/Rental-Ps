<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Rental PS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <style>
        /* ========== VARIABEL WARNA SAMA DENGAN INDEX ========== */
        :root {
            --primary: #1e3c72;
            --primary-light: #2a4f8c;
            --secondary: #2ecc71;
            --secondary-dark: #27ae60;
            --accent: #f39c12;
            --accent-dark: #e67e22;
            --dark: #2c3e50;
            --light: #ecf0f1;
            --white: #ffffff;
            --gray: #95a5a6;
            --danger: #e74c3c;
            --success: #27ae60;
        }

        /* ========== ANIMASI ========== */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes shimmer {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Background Animation */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, var(--secondary) 0%, transparent 30%);
            opacity: 0.1;
            animation: spin 30s linear infinite;
        }

        body::after {
            content: '';
            position: absolute;
            bottom: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, var(--accent) 0%, transparent 30%);
            opacity: 0.1;
            animation: spin 40s linear infinite reverse;
        }
        
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            position: relative;
            z-index: 2;
            animation: fadeInUp 0.8s ease-out;
        }
        
        .login-box {
            background: var(--white);
            padding: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.6s ease-out;
        }

        .login-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--secondary), var(--accent));
            animation: shimmer 2s infinite;
        }
        
        .login-box h1 {
            color: var(--primary);
            margin-bottom: 10px;
            font-size: 2rem;
            font-weight: 700;
            position: relative;
            display: inline-block;
        }

        .login-box h1::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 50%;
            height: 3px;
            background: var(--secondary);
            animation: shimmer 2s infinite;
        }
        
        .login-box p {
            color: var(--gray);
            margin-bottom: 30px;
            font-size: 0.95rem;
        }
        
        .form-group {
            margin-bottom: 20px;
            animation: fadeIn 0.8s ease-out;
            animation-fill-mode: both;
        }

        .form-group:nth-child(1) { animation-delay: 0.2s; }
        .form-group:nth-child(2) { animation-delay: 0.3s; }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--dark);
            transition: color 0.3s;
        }

        .form-group:hover label {
            color: var(--secondary);
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--secondary);
            box-shadow: 0 0 0 4px rgba(46,204,113,0.1);
        }
        
        .btn {
            padding: 14px 30px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s;
            font-size: 1rem;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            animation: fadeIn 1s ease-out;
            animation-delay: 0.4s;
            animation-fill-mode: both;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }
        
        .btn-primary {
            background: var(--secondary);
            color: var(--white);
            width: 100%;
            box-shadow: 0 10px 20px rgba(46,204,113,0.3);
        }
        
        .btn-primary:hover {
            background: var(--secondary-dark);
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(46,204,113,0.4);
        }

        .btn-primary:active {
            transform: translateY(-1px);
        }
        
        .alert {
            padding: 12px 15px;
            margin-bottom: 20px;
            border-radius: 8px;
            animation: fadeIn 0.3s ease-out;
            border-left: 4px solid transparent;
        }
        
        .alert-error {
            background: rgba(231, 76, 60, 0.1);
            color: var(--danger);
            border-left-color: var(--danger);
        }
        
        .alert-success {
            background: rgba(39, 174, 96, 0.1);
            color: var(--success);
            border-left-color: var(--success);
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid var(--white);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        /* Hover effect on login box */
        .login-box:hover {
            box-shadow: 0 40px 80px rgba(0,0,0,0.4);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-box {
                padding: 30px 20px;
            }
            
            .login-box h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1>Admin Login</h1>
            <p>Rental PS Professional</p>
            
            <div id="loginAlert" class="alert" style="display: none;"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">
                        <i class="fas fa-envelope" style="margin-right: 5px; color: var(--secondary);"></i>
                        Email
                    </label>
                    <input type="email" id="email" placeholder="admin@rentalps.com" required>
                </div>
                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock" style="margin-right: 5px; color: var(--secondary);"></i>
                        Password
                    </label>
                    <input type="password" id="password" placeholder="********" required>
                </div>
                <button type="submit" class="btn btn-primary" id="btnLogin">
                    <i class="fas fa-sign-in-alt" style="margin-right: 8px;"></i>
                    Login
                </button>
            </form>

            <!-- Decorative elements -->
            <div style="margin-top: 20px; text-align: center; font-size: 0.85rem; color: var(--gray);">
                <i class="fas fa-shield-alt" style="color: var(--secondary);"></i>
                Secure Admin Access
            </div>
        </div>
    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDzkgjwSNAmLg4cIMTWd6xztzjiJ2JTuns",
            authDomain: "ps-web-db8b5.firebaseapp.com",
            projectId: "ps-web-db8b5",
            storageBucket: "ps-web-db8b5.firebasestorage.app",
            messagingSenderId: "922651034551",
            appId: "1:922651034551:web:ff7106f53c51b5da149e32"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // Cek apakah sudah login
        auth.onAuthStateChanged((user) => {
            if (user) {
                // Langsung ke dashboard jika sudah login
                window.location.href = 'dashboard.html';
            }
        });

        // Show alert
        function showAlert(message, type) {
            const alert = document.getElementById('loginAlert');
            alert.textContent = message;
            alert.className = `alert alert-${type}`;
            alert.style.display = 'block';
            
            setTimeout(() => {
                alert.style.display = 'none';
            }, 3000);
        }

        // Login handler
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btnLogin');
            
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span> Logging in...';

            try {
                await auth.signInWithEmailAndPassword(email, password);
                showAlert('Login berhasil!', 'success');
                
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
                
            } catch (error) {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt" style="margin-right: 8px;"></i> Login';
                
                let message = 'Login gagal: Email atau password salah';
                showAlert(message, 'error');
            }
        });
    </script>
</body>
</html>
